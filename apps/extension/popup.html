<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marketplace Enhancer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1 class="title">Marketplace Enhancer</h1>
      <p class="sub" id="status">Open a chat on messenger.com, then tap Reload messages.</p>
      <div class="toolbar">
        <button type="button" class="btn" id="refresh">Reload messages</button>
      </div>
      <section class="selftest" aria-label="Developer log">
        <h2 class="selftest-title">Log</h2>
        <p class="selftest-hint">
          On each <strong>full Messenger tab reload</strong>, the extension shows a short assistant note and a ghost
          reply suggestion on the page (see browser console <code>[FME content]</code> for details). Use this log
          for popup-related notes.
        </p>
        <pre class="debug-log" id="debug-log" aria-live="polite"></pre>
      </section>
      <p class="meta" id="meta" hidden></p>
      <ul class="messages" id="messages" aria-label="Mounted messages"></ul>
    </main>
    <script src="dist/popup.js"></script>
  </body>
</html>
