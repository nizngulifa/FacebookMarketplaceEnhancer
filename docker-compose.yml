services:
  postgres:
    image: postgres:16
    container_name: fme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: facebook_marketplace_enhancer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d facebook_marketplace_enhancer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
