[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fme-brain"
version = "0.1.0"
description = "Local LLM pipeline: sales chat -> seller next-message suggestion (JSON)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "openai>=1.0.0",
  "pydantic>=2.0",
  "python-dotenv>=1.0.0",
  "typer>=0.12.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]
server = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.32.0",
]

[project.scripts]
fme-brain = "fme_brain.cli:app"
fme-brain-serve = "fme_brain.server:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Editable .pth hooks starting with "_" are ignored on Python 3.11+; ensure `src` is on path.
pythonpath = ["src"]
